<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ToaY-CloudsMC社区</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0d1117;
color:white;
font-family:sans-serif;
overflow-x:hidden;
}

header{
padding:120px 20px;
text-align:center;
background:linear-gradient(135deg,#5865F2,#238636);
}

header h1{
font-size:60px;
margin-bottom:20px;
}

header p{
font-size:22px;
opacity:0.9;
}

.dc-btn{
display:inline-block;
margin-top:30px;
padding:18px 40px;
background:#5865F2;
color:white;
text-decoration:none;
font-size:22px;
border-radius:15px;
transition:0.3s;
border:none;
cursor:pointer;
}

.dc-btn:hover{
transform:scale(1.05);
background:#4752c4;
}

.section{
padding:80px 20px;
text-align:center;
}

.card{
max-width:900px;
margin:auto;
background:#161b22;
padding:50px;
border-radius:25px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.card h2{
font-size:42px;
margin-bottom:20px;
color:#58a6ff;
}

.card p{
font-size:20px;
line-height:1.8;
color:#c9d1d9;
}

input{
padding:18px;
width:80%;
max-width:500px;
border:none;
border-radius:12px;
font-size:18px;
outline:none;
}

footer{
padding:30px;
text-align:center;
color:#8b949e;
font-size:15px;
}

.glow{
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px #58a6ff;
}
to{
text-shadow:0 0 25px #58a6ff;
}
}

</style>

</head>

<body>

<header>

<h1 class="glow">
ToaY-CloudsMC社区
</h1>

<p>
欢迎来到 ToaY-CloudsMC 官方网站
</p>

<a class="dc-btn"
href="https://discord.gg/gwCjwyNmGG">

加入我们的 Discord

</a>

</header>

<section class="section">

<div class="card">

<h2>邮箱注册系统</h2>

<p>
输入邮箱加入社区通知
</p>

<br>

<input type="email"
placeholder="请输入你的邮箱">

<br><br>

<button class="dc-btn">

立即注册

</button>

</div>

</section>

<section class="section">

<div class="card">

<h2>资源导航</h2>

<p>
点击下面按钮进入资源中心
</p>

<br>

<a class="dc-btn"
href="https://1847836810.mshare.123pan.cn/123pan/s7J3vd-paHO3">

进入资源导航

</a>

</div>

</section>

<section class="section">

<div class="card">

<h2>为什么推荐 Discord？</h2>

<p>

KOOK、QQ 为中转站。<br><br>

推荐直接加入 Discord。<br><br>

Discord 比普通群聊、频道更自由、更强大，
拥有更好的语音、机器人系统以及社区体验。

</p>

</div>

</section>

<section class="section">

<div class="card">

<h2>社区功能</h2>

<p>

✔ 活跃聊天<br><br>

✔ 游戏交流<br><br>

✔ 多频道系统<br><br>

✔ 社区机器人<br><br>

✔ 长期更新维护

</p>

</div>

</section>

<footer>

© 2026 ToaY-CloudsMC社区

</footer>

</body>

</html>
