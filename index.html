<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToaY-CloudsMC 社区</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0d1117;
font-family:sans-serif;
color:white;
overflow-x:hidden;
}

.top{
width:100%;
padding:80px 20px;
text-align:center;
background:linear-gradient(135deg,#111827,#1e293b);
border-bottom:1px solid #222;
}

.top h1{
font-size:45px;
margin-bottom:15px;
color:#58a6ff;
}

.top p{
color:#aaa;
font-size:18px;
}

.box{
max-width:420px;
margin:40px auto;
background:#161b22;
padding:30px;
border-radius:20px;
border:1px solid #30363d;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.box h2{
margin-bottom:20px;
text-align:center;
}

input{
width:100%;
padding:15px;
margin-top:10px;
background:#0d1117;
border:1px solid #30363d;
border-radius:10px;
color:white;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.register{
background:#238636;
color:white;
}

.login{
background:#1f6feb;
color:white;
}

.discord{
background:#5865F2;
color:white;
}

.resource{
background:#f59e0b;
color:white;
}

button:hover{
opacity:0.8;
transform:scale(1.02);
}

.links{
max-width:420px;
margin:20px auto;
}

.footer{
text-align:center;
padding:30px;
color:#666;
font-size:14px;
}

.status{
margin-top:15px;
text-align:center;
color:#58a6ff;
}
</style>
</head>

<body>

<div class="top">
<h1>ToaY-CloudsMC 社区</h1>

<p>
KOOK、QQ 为中转站<br>
推荐加入 Discord 社区
</p>
</div>

<div class="box">

<h2>注册 / 登录</h2>

<input type="email" id="email" placeholder="输入邮箱">

<input type="password" id="password" placeholder="输入密码">

<button class="register" onclick="register()">
注册账号
</button>

<button class="login" onclick="login()">
登录账号
</button>

<div class="status" id="status"></div>

</div>

<div class="links">

<button class="discord"
onclick="window.open('https://discord.gg/gwCjwyNmGG')">
加入我们的 Discord
</button>

<button class="resource"
onclick="window.open('https://1847836810.mshare.123pan.cn/123pan/s7J3vd-paHO3')">
资源导航
</button>

</div>

<div class="footer">
© 2026 ToaY-CloudsMC Community
</div>

<script>

const supabaseUrl =
'https://dupzyidgifkbmgyicntl.supabase.co'

const supabaseKey =
'sb_publishable_oM5fgDZM207YZwKf5rZ17g_0CA46rbW'

const supabase =
window.supabase.createClient(
supabaseUrl,
supabaseKey
)

async function register(){

const email =
document.getElementById("email").value

const password =
document.getElementById("password").value

const status =
document.getElementById("status")

const { data, error } =
await supabase.auth.signUp({
email: email,
password: password
})

if(error){
status.innerText =
"注册失败：" + error.message
}else{
status.innerText =
"注册成功！请检查邮箱验证"
}

}

async function login(){

const email =
document.getElementById("email").value

const password =
document.getElementById("password").value

const status =
document.getElementById("status")

const { data, error } =
await supabase.auth.signInWithPassword({
email: email,
password: password
})

if(error){
status.innerText =
"登录失败：" + error.message
}else{
status.innerText =
"登录成功！"
}

}

</script>

</body>
</html>
