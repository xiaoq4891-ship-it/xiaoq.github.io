    .btn{
      display:block;
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      margin-bottom:16px;
      transition:0.2s;
      text-decoration:none;
      color:white;
    }

    .discord{
      background:#5865F2;
    }

    .discord:hover{

    }

    .help{

    }

    .help:hover{
      background:#e68900;
    }

    .resource{
      background:#00b894;
    }

    .resource:hover{

    }

    .footer{

      color:#888;
